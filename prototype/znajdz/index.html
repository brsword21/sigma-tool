<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Znajdź — wizualny agent zakupowy.">
  <title>znajdź.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { paper: '#f4f2ed', ink: '#161616', acid: '#c7ff4a' },
          fontFamily: { sans: ['Manrope', 'ui-sans-serif', 'system-ui', 'sans-serif'] }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>window.PICKY_CONFIG = window.PICKY_CONFIG || {};</script>
  <script src="./config.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');

    :root { color-scheme: light; --ink: #161616; --paper: #f4f2ed; --acid: #c7ff4a; }
    * { box-sizing: border-box; scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }
    html, body { height: 100%; }
    body { margin: 0; overflow: hidden; background: #fff; color: var(--ink); }
    button, textarea, input { font: inherit; }

    .app { height: 100vh; height: 100dvh; }
    .main-height { height: calc(100vh - 72px); height: calc(100dvh - 72px); }
    .hairline { border-color: rgba(22, 22, 22, .11); }

    .stage {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 44%, rgba(255,255,255,.98) 0 18%, rgba(255,255,255,.38) 43%, transparent 65%),
        linear-gradient(145deg, #eeece6 0%, #f8f7f3 52%, #e8e5dc 100%);
    }
    .stage::before {
      content: '';
      position: absolute;
      inset: 9%;
      border: 1px solid rgba(22,22,22,.08);
      border-radius: 48% 52% 46% 54% / 54% 43% 57% 46%;
      transform: rotate(-5deg);
      transition: transform 1.2s cubic-bezier(.2,.8,.2,1), opacity .5s ease;
      z-index: -1;
    }
    .stage.searching::before { transform: rotate(4deg) scale(.91); opacity: .55; }

    .ambient-dot {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--ink);
      opacity: .18;
      animation: blink 2.4s ease-in-out infinite;
    }
    .ambient-dot:nth-child(2) { animation-delay: -.8s; }
    .ambient-dot:nth-child(3) { animation-delay: -1.6s; }

    .product-model {
      position: absolute;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      opacity: 0;
      filter: drop-shadow(0 26px 22px rgba(35,32,27,.12));
      transform: translateY(22px) scale(.88);
      transition: opacity .65s ease, width .8s cubic-bezier(.2,.8,.2,1), left .8s cubic-bezier(.2,.8,.2,1), top .8s cubic-bezier(.2,.8,.2,1), transform .8s cubic-bezier(.2,.8,.2,1), filter .4s ease;
      will-change: transform;
    }
    .product-model img { display: block; width: 100%; height: auto; pointer-events: none; }
    .product-model.visible { opacity: .6; }
    .product-model.selected { opacity: 1; z-index: 4; filter: drop-shadow(0 35px 30px rgba(35,32,27,.16)); }
    .product-model:hover { filter: drop-shadow(0 30px 24px rgba(35,32,27,.2)); }
    .product-model[data-id="1"] { width: 40%; left: 4%; top: 7%; animation: floatA 6.8s ease-in-out infinite; }
    .product-model[data-id="2"] { width: 42%; left: 46%; top: 35%; animation: floatB 7.6s ease-in-out infinite; }
    .product-model[data-id="3"] { width: 34%; left: 50%; top: 2%; animation: floatC 8.2s ease-in-out infinite; }
    .product-model.selected { width: 59%; left: 20%; top: 12%; animation-name: floatSelected; }
    .product-model.muted { transform: scale(.78); opacity: .28; }

    .stage.searching .product-model.visible { opacity: .72; }
    .stage.searching .product-model[data-id="1"] { animation-duration: 3s; }
    .stage.searching .product-model[data-id="2"] { animation-duration: 3.6s; }
    .stage.searching .product-model[data-id="3"] { animation-duration: 3.3s; }

    .composer {
      box-shadow: 0 22px 70px rgba(22,22,22,.10), 0 2px 8px rgba(22,22,22,.04);
      transition: box-shadow .25s ease, transform .25s ease, border-color .25s ease;
    }
    .composer:focus-within { border-color: rgba(22,22,22,.35); box-shadow: 0 26px 80px rgba(22,22,22,.14); transform: translateY(-2px); }
    textarea { field-sizing: content; }

    .result-row { animation: rowIn .45s cubic-bezier(.2,.8,.2,1) both; }
    .message-in { animation: rowIn .35s cubic-bezier(.2,.8,.2,1) both; }
    .menu-in { animation: menuIn .18s ease-out both; transform-origin: top right; }
    .toast-in { animation: toastIn .28s ease-out both; }

    .image-preview img { width: 100%; height: 100%; object-fit: cover; }
    .settings-switch { transition: background .2s ease; }
    .settings-switch span { transition: transform .2s ease; }
    .settings-switch[aria-checked="true"] { background: var(--ink); }
    .settings-switch[aria-checked="true"] span { transform: translateX(16px); }
    .account-backdrop { background: rgba(22,22,22,.24); backdrop-filter: blur(12px); }
    .account-panel { box-shadow: 0 40px 120px rgba(22,22,22,.24); }
    .account-panel::before {
      content: ''; position: absolute; inset: 0 0 auto; height: 4px;
      background: linear-gradient(90deg, var(--acid), var(--acid) 28%, transparent 28%);
    }

    @keyframes floatA { 0%,100% { transform: translate3d(0,0,0) rotate(-3deg); } 50% { transform: translate3d(10px,-16px,0) rotate(1deg); } }
    @keyframes floatB { 0%,100% { transform: translate3d(0,0,0) rotate(3deg); } 50% { transform: translate3d(-12px,-20px,0) rotate(-2deg); } }
    @keyframes floatC { 0%,100% { transform: translate3d(0,0,0) rotate(2deg); } 50% { transform: translate3d(8px,-13px,0) rotate(-2deg); } }
    @keyframes floatSelected { 0%,100% { transform: translate3d(0,0,0) rotate(-1deg); } 50% { transform: translate3d(0,-14px,0) rotate(1deg); } }
    @keyframes blink { 0%,100% { transform: scale(.7); opacity: .12; } 50% { transform: scale(1.45); opacity: .42; } }
    @keyframes rowIn { from { opacity: 0; transform: translateY(12px); } }
    @keyframes menuIn { from { opacity: 0; transform: scale(.96) translateY(-5px); } }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } }

    @media (max-width: 767px) {
      body { overflow: auto; }
      .app { min-height: 100dvh; height: auto; }
      .main-height { height: auto; min-height: calc(100dvh - 64px); }
      .mobile-chat { min-height: 52dvh; }
      .stage { min-height: 48dvh; border-top: 1px solid rgba(22,22,22,.11); }
      .product-model.selected { width: 62%; left: 19%; top: 8%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }

    .composer-wrap { position: relative; }
    .suggestions {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 0;
      right: 0;
      z-index: 40;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(22, 22, 22, .11);
      background: rgba(255, 255, 255, .97);
      box-shadow: 0 18px 60px rgba(22, 22, 22, .12);
      backdrop-filter: blur(12px);
    }
    .suggestions-header {
      padding: 10px 14px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(22, 22, 22, .35);
    }
    .suggestion-item {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 10px;
      border: 0;
      background: transparent;
      padding: 11px 14px;
      text-align: left;
      font-size: 13px;
      color: var(--ink);
      cursor: pointer;
      transition: background .15s ease;
    }
    .suggestion-item:hover,
    .suggestion-item[aria-selected="true"] { background: rgba(22, 22, 22, .045); }
    .suggestion-item + .suggestion-item { border-top: 1px solid rgba(22, 22, 22, .06); }
    .suggestion-item mark { background: rgba(199, 255, 74, .55); color: inherit; border-radius: 3px; padding: 0 2px; }

    .verification-panel { animation: rowIn .3s cubic-bezier(.2,.8,.2,1) both; }
    .verification-alert { border-left: 3px solid rgba(22, 22, 22, .15); }
    .verification-alert.warning { border-left-color: #d97706; background: rgba(217, 119, 6, .06); }
    .verification-alert.danger { border-left-color: #dc2626; background: rgba(220, 38, 38, .06); }
    .verification-alert.info { border-left-color: #2563eb; background: rgba(37, 99, 235, .05); }
    .verification-alert.success { border-left-color: #16a34a; background: rgba(22, 163, 74, .05); }
    .verification-toggle[aria-expanded="true"] .verification-chevron { transform: rotate(180deg); }
    .verification-chevron { transition: transform .2s ease; }
  </style>
</head>
<body class="font-sans antialiased selection:bg-acid selection:text-ink">
  <div class="app flex flex-col">
    <header class="relative z-30 flex h-[72px] shrink-0 items-center justify-between px-5 sm:px-8 lg:px-10">
      <button id="brandButton" type="button" class="text-[18px] font-bold tracking-[-.055em] text-ink focus:outline-none focus-visible:ring-2 focus-visible:ring-ink">znajdź<span class="text-[#8a8a84]">.</span></button>

      <div class="relative">
        <button id="menuButton" type="button" class="grid h-11 w-11 place-items-center rounded-full text-ink transition hover:bg-black/[.045] focus:outline-none focus-visible:ring-2 focus-visible:ring-ink" aria-label="Ustawienia agenta" aria-expanded="false" aria-controls="settingsMenu">
          <i data-lucide="ellipsis" class="h-5 w-5"></i>
        </button>

        <div id="settingsMenu" class="menu-in absolute right-0 top-12 hidden w-[280px] overflow-hidden rounded-[22px] border hairline bg-white p-2 shadow-[0_24px_80px_rgba(22,22,22,.16)]" role="dialog" aria-label="Ustawienia agenta">
          <div class="px-3 pb-2 pt-3 text-[11px] font-semibold uppercase tracking-[.14em] text-black/40">Agent</div>
          <button id="accountButton" type="button" class="flex w-full items-center gap-3 rounded-2xl px-3 py-3 text-left hover:bg-black/[.035]">
            <span id="accountIcon" class="grid h-8 w-8 shrink-0 place-items-center rounded-full bg-acid text-ink"><i data-lucide="user-round" class="h-4 w-4"></i></span>
            <span class="min-w-0 flex-1"><span id="accountLabel" class="block truncate text-sm font-semibold">Zaloguj się</span><span id="accountMeta" class="block truncate text-[11px] text-black/40">Zapisuj historię rozmów</span></span>
            <i data-lucide="chevron-right" class="h-4 w-4 text-black/25"></i>
          </button>
          <div class="mx-3 my-1 border-t hairline"></div>
          <label class="flex cursor-pointer items-center justify-between rounded-2xl px-3 py-3 hover:bg-black/[.035]">
            <span class="text-sm font-medium">Automatyczne zamiany</span>
            <button id="autoSwitch" type="button" role="switch" aria-checked="true" class="settings-switch relative h-6 w-10 rounded-full bg-black/15 p-1" aria-label="Automatyczne zamiany">
              <span class="block h-4 w-4 rounded-full bg-white shadow-sm"></span>
            </button>
          </label>
          <div class="rounded-2xl px-3 py-3 hover:bg-black/[.035]">
            <label for="priority" class="mb-2 block text-sm font-medium">Priorytet</label>
            <select id="priority" class="w-full cursor-pointer appearance-none rounded-xl border hairline bg-white px-3 py-2 text-xs outline-none focus:border-black/40">
              <option value="balance">Balans</option>
              <option value="price">Cena</option>
              <option value="quality">Jakość</option>
            </select>
          </div>
          <button id="resetButton" type="button" class="flex w-full items-center gap-2 rounded-2xl px-3 py-3 text-sm font-medium text-black/55 hover:bg-black/[.035] hover:text-ink">
            <i data-lucide="rotate-ccw" class="h-4 w-4"></i> Zacznij od nowa
          </button>
        </div>
      </div>
    </header>

    <main class="main-height grid min-h-0 flex-1 md:grid-cols-2">
      <section class="mobile-chat relative flex min-h-0 flex-col px-5 pb-5 sm:px-8 sm:pb-8 lg:px-10 lg:pb-10" aria-label="Rozmowa z agentem">
        <div id="conversation" class="mx-auto flex w-full max-w-[660px] flex-1 flex-col justify-end overflow-y-auto pb-5 pt-4" aria-live="polite">
          <div id="messages" class="space-y-3"></div>
          <div id="results" class="mt-6 hidden overflow-hidden rounded-[22px] border hairline bg-white"></div>
        </div>

        <div class="composer-wrap mx-auto w-full max-w-[660px]">
          <div id="suggestions" class="suggestions hidden" role="listbox" aria-label="Sugestie wyszukiwania">
            <div class="suggestions-header">Sugestie</div>
            <div id="suggestionsList"></div>
          </div>
          <form id="chatForm" class="composer rounded-[25px] border hairline bg-white p-2" autocomplete="off">
          <div id="attachmentPreview" class="image-preview relative ml-2 mt-2 hidden h-16 w-16 overflow-hidden rounded-xl bg-paper">
            <img id="previewImage" alt="Wklejone zdjęcie">
            <button id="removeImage" type="button" class="absolute right-1 top-1 grid h-5 w-5 place-items-center rounded-full bg-black/75 text-white" aria-label="Usuń zdjęcie">
              <i data-lucide="x" class="h-3 w-3"></i>
            </button>
          </div>
          <label for="promptInput" class="sr-only">Czego szukasz?</label>
          <textarea id="promptInput" rows="1" maxlength="600" placeholder="Czego szukasz?" class="max-h-32 min-h-[58px] w-full resize-none bg-transparent px-4 py-4 text-[15px] leading-6 text-ink outline-none placeholder:text-black/35"></textarea>
          <div class="flex items-center justify-between px-1 pb-1">
            <div class="flex items-center">
              <input id="imageInput" type="file" accept="image/*" class="sr-only">
              <button id="attachButton" type="button" class="grid h-10 w-10 place-items-center rounded-full text-black/45 transition hover:bg-black/[.05] hover:text-ink focus:outline-none focus-visible:ring-2 focus-visible:ring-ink" aria-label="Dodaj zdjęcie" title="Dodaj lub wklej zdjęcie">
                <i data-lucide="paperclip" class="h-[18px] w-[18px]"></i>
              </button>
              <span id="pasteHint" class="hidden text-[11px] text-black/30 sm:block">możesz też wkleić zdjęcie</span>
            </div>
            <button id="sendButton" type="submit" disabled class="grid h-11 w-11 place-items-center rounded-full bg-ink text-white transition hover:scale-[1.04] disabled:cursor-not-allowed disabled:bg-black/10 disabled:text-black/30 focus:outline-none focus-visible:ring-2 focus-visible:ring-ink focus-visible:ring-offset-2" aria-label="Wyślij">
              <i data-lucide="arrow-up" class="h-[19px] w-[19px]"></i>
            </button>
          </div>
        </form>
        </div>
      </section>

      accountModal: $('#accountModal'), signedOutView: $('#signedOutView'), signedInView: $('#signedInView'),
      loginForm: $('#loginForm'), loginEmail: $('#loginEmail'), loginSubmit: $('#loginSubmit'), loginStatus: $('#loginStatus'),
      accountEmail: $('#accountEmail'), historyList: $('#historyList')
    };

    const config = window.PICKY_CONFIG || {};
    const apiBaseUrl = (config.apiBaseUrl || 'http://localhost:8000').replace(/\/$/, '');

    const money = value => new Intl.NumberFormat('pl-PL', { style: 'currency', currency: 'PLN', maximumFractionDigits: 0 }).format(value);
    const safe = text => text.replace(/[&<>'"]/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' })[char]);
    const refreshIcons = () => window.lucide && lucide.createIcons();

    function highlightMatch(text, query) {
      if (!query) return safe(text);
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return safe(text).replace(new RegExp(`(${escaped})`, 'ig'), '<mark>$1</mark>');
    }

    function filterSuggestions(query) {
      const normalized = query.trim().toLowerCase();
      if (!normalized) return searchSuggestions.slice(0, 5);
      return searchSuggestions.filter(item => item.toLowerCase().includes(normalized)).slice(0, 6);
    }

    function setSuggestionsOpen(open) {
      state.suggestionsOpen = open;
      el.suggestions.classList.toggle('hidden', !open);
      if (!open) state.suggestionIndex = -1;
    }

    function renderSuggestions() {
      const query = el.input.value;
      const items = filterSuggestions(query);
      if (!items.length || state.loading) {
        setSuggestionsOpen(false);
        return;
      }
      el.suggestionsList.innerHTML = items.map((item, index) => `
        <button type="button" class="suggestion-item" role="option" data-suggestion="${safe(item)}" aria-selected="${state.suggestionIndex === index}">
          <i data-lucide="search" class="h-3.5 w-3.5 shrink-0 text-black/25"></i>
          <span>${highlightMatch(item, query.trim())}</span>
        </button>`).join('');
      setSuggestionsOpen(true);
      refreshIcons();
    }

    function applySuggestion(text) {
      el.input.value = text;
      setSuggestionsOpen(false);
      syncSend();
      el.input.focus();
    }

    function normalizeQuery(text) {
      return text.toLowerCase().normalize('NFD').replace(/\p{M}/gu, '');
    }

    function buildDynamicAlerts(product, query) {
      const q = normalizeQuery(query);
      const alerts = [];
      const v = product.verification;
      if (!v) return alerts;

      (v.risks || []).forEach(riskId => {
        if (riskCatalog[riskId]) alerts.push({ ...riskCatalog[riskId], id: riskId });
      });

      if (/rozmiar|size/.test(q) && v.risks?.includes('size_unconfirmed')) {
        if (!alerts.some(item => item.id === 'size_unconfirmed')) {
          alerts.push({ ...riskCatalog.size_unconfirmed, id: 'size_unconfirmed' });
        }
      }

      if (/bater/i.test(q) && !v.battery) {
        alerts.push({ ...riskCatalog.battery_missing, id: 'battery_missing' });
      }

      if (/idealn|nowy|jak nowy|stan/.test(q) && /ogólny|brak zdjęć|!!!/.test(v.description)) {
        alerts.push({ ...riskCatalog.condition_mismatch, id: 'condition_mismatch' });
      }

      if (/sprawdzon|bezpiecz|renom|zauf/.test(q) && v.seller?.score < 60) {
        if (!alerts.some(item => item.id === 'seller_reputation')) {
          alerts.push({ ...riskCatalog.seller_reputation, id: 'seller_reputation' });
        }
      }

      const productTerms = {
        1: ['kurt', 'membran', 'technicz', 'outdoor', 'gór'],
        2: ['but', 'trek', 'gór', 'hik'],
        3: ['plecak', 'biwak', '28', '30', 'lit']
      };
      if (productTerms[product.id]?.some(term => q.includes(term)) && !v.risks?.length) {
        alerts.unshift({ ...riskCatalog.query_match, id: 'query_match' });
      }

      return alerts;
    }

    function getVerificationStatus(alerts) {
      if (alerts.some(item => item.type === 'danger')) return { label: 'Wysokie ryzyko', tone: 'danger' };
      if (alerts.some(item => item.type === 'warning')) return { label: 'Wymaga uwagi', tone: 'warning' };
      if (alerts.some(item => item.type === 'info')) return { label: 'Do weryfikacji', tone: 'info' };
      return { label: 'Oferta wiarygodna', tone: 'success' };
    }

    function renderVerificationBadges(alerts) {
      const status = getVerificationStatus(alerts);
      const tones = {
        danger: 'bg-red-100 text-red-700',
        warning: 'bg-amber-100 text-amber-800',
        info: 'bg-blue-100 text-blue-700',
        success: 'bg-emerald-100 text-emerald-700'
      };
      el.verificationBadges.innerHTML = `<span class="rounded-full px-2 py-0.5 text-[10px] font-semibold ${tones[status.tone]}">${status.label}</span>`;
      el.verificationToggleLabel.textContent = `Weryfikacja oferty · ${status.label.toLowerCase()}`;
    }

    function renderVerificationPanel(product) {
      const v = product.verification;
      if (!v) {
        el.verificationPanel.innerHTML = '<p class="text-xs text-black/45">Brak danych weryfikacyjnych dla tego produktu.</p>';
        return;
      }

      const alerts = buildDynamicAlerts(product, state.lastQuery);
      renderVerificationBadges(alerts);

      const batteryRow = v.battery
        ? `<div><dt class="text-[10px] font-semibold uppercase tracking-[.1em] text-black/35">Kondycja baterii</dt><dd class="mt-1 text-xs leading-5 text-black/70">${safe(v.battery)}</dd></div>`
        : `<div><dt class="text-[10px] font-semibold uppercase tracking-[.1em] text-black/35">Kondycja baterii</dt><dd class="mt-1 text-xs leading-5 text-black/45">Nie dotyczy tego produktu</dd></div>`;

      const alertHtml = alerts.length ? alerts.map(alert => `
        <div class="verification-alert ${alert.type} rounded-xl px-3 py-2.5">
          <p class="text-[11px] font-semibold text-ink">${safe(alert.title)}</p>
          <p class="mt-1 text-[11px] leading-5 text-black/55">${safe(alert.text)}</p>
        </div>`).join('') : `
        <div class="verification-alert success rounded-xl px-3 py-2.5">
          <p class="text-[11px] font-semibold text-ink">Brak wykrytych nieścisłości</p>
          <p class="mt-1 text-[11px] leading-5 text-black/55">Dane ogłoszenia, sprzedawca i opis są spójne z Twoim zapytaniem.</p>
        </div>`;

      el.verificationPanel.innerHTML = `
        <div class="space-y-3">
          <dl class="grid gap-3 sm:grid-cols-2">
            <div><dt class="text-[10px] font-semibold uppercase tracking-[.1em] text-black/35">Stan produktu</dt><dd class="mt-1 text-xs leading-5 text-black/70">${safe(v.condition)}</dd></div>
            ${batteryRow}
          </dl>
          <div>
            <dt class="text-[10px] font-semibold uppercase tracking-[.1em] text-black/35">Opis ogłoszenia</dt>
            <dd class="mt-1 text-xs leading-5 text-black/60">${safe(v.description)}</dd>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <span class="text-[10px] font-semibold uppercase tracking-[.1em] text-black/35">Link do ogłoszenia</span>
            <a href="${safe(v.listingUrl)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 rounded-full bg-ink px-2.5 py-1 text-[11px] font-medium text-white transition hover:opacity-85">
              ${safe(v.platform)} <i data-lucide="external-link" class="h-3 w-3"></i>
            </a>
          </div>
          <div class="rounded-xl border hairline bg-white/70 p-3">
            <p class="text-[10px] font-semibold uppercase tracking-[.1em] text-black/35">Sprzedawca</p>
            <p class="mt-1 text-xs font-medium text-ink">${safe(v.seller.name)}</p>
            <p class="mt-0.5 text-[11px] text-black/45">Ocena zaufania ${v.seller.score}/100 · ${v.seller.reviews} opinii · konto ${safe(v.seller.accountAge)}</p>
          </div>
          <div class="space-y-2">
            <p class="text-[10px] font-semibold uppercase tracking-[.1em] text-black/35">Analiza względem zapytania</p>
            ${alertHtml}
          </div>
        </div>`;
      refreshIcons();
    }

    function setVerificationExpanded(expanded) {
      state.verificationExpanded = expanded;
      el.verificationToggle.setAttribute('aria-expanded', String(expanded));
      el.verificationPanel.classList.toggle('hidden', !expanded);
    }

    function canSend() { return Boolean(el.input.value.trim() || state.imageData) && !state.loading; }
    function syncSend() { el.send.disabled = !canSend(); }

    function showToast(text) {
      el.toast.textContent = text;
      el.toast.classList.remove('hidden');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.toast.classList.add('hidden'), 1900);
    }

    function setAccountOpen(open) {
      el.accountModal.classList.toggle('hidden', !open);
      el.accountModal.classList.toggle('flex', open);
      document.body.style.overflow = open ? 'hidden' : '';
      if (open) {
        setMenu(false);
        if (state.authSession) loadHistory();
        else setTimeout(() => el.loginEmail.focus(), 50);
      }
    }

    function applyAuthSession(session) {
      const previousUserId = state.authSession?.user?.id;
      state.authSession = session;
      if (previousUserId !== session?.user?.id) state.remoteSessionId = null;
      const email = session?.user?.email;
      el.signedOutView.classList.toggle('hidden', Boolean(email));
      el.signedInView.classList.toggle('hidden', !email);
      el.accountLabel.textContent = email || 'Zaloguj się';
      el.accountMeta.textContent = email ? 'Historia jest zapisywana' : 'Zapisuj historię rozmów';
      el.accountEmail.textContent = email || '';
      refreshIcons();
    }

    async function authenticatedFetch(path, options = {}) {
      const token = state.authSession?.access_token;
      if (!token) throw new Error('authentication_required');
      const headers = new Headers(options.headers || {});
      headers.set('Authorization', `Bearer ${token}`);
      if (options.body) headers.set('Content-Type', 'application/json');
      const response = await fetch(`${apiBaseUrl}${path}`, { ...options, headers });
      if (response.status === 401) {
        await state.authClient?.auth.signOut();
        throw new Error('session_expired');
      }
      if (!response.ok) throw new Error(`api_${response.status}`);
      return response.json();
    }

    async function ensureRemoteSession() {
      if (state.remoteSessionId) return state.remoteSessionId;
      const data = await authenticatedFetch('/sessions', { method: 'POST' });
      state.remoteSessionId = data.session_id;
      return state.remoteSessionId;
    }

    async function persistConversation(text) {
      if (!state.authSession || !text) return;
      try {
        const sessionId = await ensureRemoteSession();
        await authenticatedFetch(`/sessions/${sessionId}/messages`, {
          method: 'POST',
          body: JSON.stringify({ message: text })
        });
      } catch (error) {
        if (error.message === 'session_expired') showToast('Sesja wygasła — zaloguj się ponownie');
      }
    }

    function historyTitle(session) {
      return session.message_summary || 'Nowa rozmowa';
    }

    async function loadHistory() {
      if (!state.authSession) return;
      el.historyList.innerHTML = '<p class="rounded-2xl bg-white/60 px-4 py-5 text-center text-xs text-black/40">Wczytuję rozmowy…</p>';
      try {
        const data = await authenticatedFetch('/sessions/history');
        if (!data.sessions.length) {
          el.historyList.innerHTML = '<div class="rounded-2xl border border-dashed hairline px-4 py-7 text-center"><p class="text-sm font-semibold">Jeszcze tu cicho.</p><p class="mt-1 text-xs text-black/40">Nowe rozmowy pojawią się po pierwszej wiadomości.</p></div>';
          return;
        }
        el.historyList.innerHTML = data.sessions.map(session => `
          <button type="button" data-history-id="${session.id}" class="group flex w-full items-center gap-3 rounded-2xl bg-white px-4 py-3 text-left hover:bg-acid/40">
            <span class="grid h-8 w-8 shrink-0 place-items-center rounded-full bg-black/[.045]"><i data-lucide="message-circle" class="h-3.5 w-3.5 text-black/45"></i></span>
            <span class="min-w-0 flex-1"><span class="block truncate text-sm font-medium">${safe(historyTitle(session))}</span><span class="mt-0.5 block text-[11px] text-black/35">Zapisana rozmowa</span></span>
            <i data-lucide="arrow-up-right" class="h-3.5 w-3.5 text-black/20 group-hover:text-ink"></i>
          </button>`).join('');
        refreshIcons();
      } catch (error) {
        el.historyList.innerHTML = '<p class="rounded-2xl bg-red-50 px-4 py-4 text-xs leading-5 text-red-700">Nie udało się pobrać historii. Sprawdź połączenie z API i spróbuj ponownie.</p>';
      }
    }

    async function openHistorySession(sessionId) {
      try {
        const data = await authenticatedFetch(`/sessions/${sessionId}/history`);
        reset();
        state.remoteSessionId = sessionId;
        data.messages.forEach(message => {
          if (message.role === 'user') addUserMessage(message.content);
          else addAgentMessage(message.content);
        });
        setAccountOpen(false);
        showToast('Wczytano rozmowę');
      } catch (error) {
        showToast('Nie udało się wczytać rozmowy');
      }
    }

    async function initializeAuth() {
      if (!config.supabaseUrl || !config.supabasePublishableKey || !window.supabase) {
        el.accountMeta.textContent = 'Uzupełnij config.js';
        return;
      }
      state.authClient = window.supabase.createClient(
        config.supabaseUrl,
        config.supabasePublishableKey,
        { auth: { persistSession: true, detectSessionInUrl: true, flowType: 'pkce' } }
      );
      const { data } = await state.authClient.auth.getSession();
      applyAuthSession(data.session);
      state.authClient.auth.onAuthStateChange((_event, session) => applyAuthSession(session));
    }

    function setMenu(open) {
      el.menu.classList.toggle('hidden', !open);
      el.menuButton.setAttribute('aria-expanded', String(open));
    }

    function handleImage(file) {
      if (!file || !file.type.startsWith('image/')) return;
      if (file.size > 8 * 1024 * 1024) return showToast('Zdjęcie może mieć maksymalnie 8 MB');
      const reader = new FileReader();
      reader.onload = event => {
        state.imageData = event.target.result;
        el.preview.src = state.imageData;
        el.attachment.classList.remove('hidden');
        syncSend();
      };
      reader.readAsDataURL(file);
    }

    function addUserMessage(text) {
      const item = document.createElement('div');
      item.className = 'message-in ml-auto max-w-[82%] text-right';
      item.innerHTML = `${state.imageData ? `<img src="${state.imageData}" alt="Załączone zdjęcie" class="mb-2 ml-auto h-20 w-20 rounded-2xl object-cover">` : ''}${text ? `<p class="text-[14px] leading-6 text-black/65">${safe(text)}</p>` : ''}`;
      el.messages.appendChild(item);
      $('#conversation').scrollTo({ top: $('#conversation').scrollHeight, behavior: 'smooth' });
    }

    function addAgentMessage(text) {
      const item = document.createElement('p');
      item.className = 'message-in max-w-[84%] text-[14px] leading-6 text-black/45';
      item.textContent = text;
      el.messages.appendChild(item);
    }

    function setLoading(loading) {
      state.loading = loading;
      el.input.disabled = loading;
      el.send.disabled = true;
      el.stage.classList.toggle('searching', loading);
      el.search.classList.toggle('hidden', !loading);
      el.search.classList.toggle('flex', loading);
      el.idle.classList.add('opacity-0');
      el.info.classList.add('hidden');
      setVerificationExpanded(false);
      if (loading) {
        el.models.forEach((model, index) => setTimeout(() => model.classList.add('visible'), index * 230));
      }
    }

    function renderResults() {
      el.results.classList.toggle('hidden', state.products.length === 0);
      el.results.innerHTML = state.products.map((product, index) => `
        <button type="button" data-result-id="${product.id}" class="result-row flex w-full items-center gap-3 border-b hairline px-4 py-3 text-left transition last:border-b-0 hover:bg-black/[.025] ${state.selectedId === product.id ? 'bg-black/[.035]' : ''}" style="animation-delay:${index * 70}ms">
          <span class="text-[11px] tabular-nums text-black/25">0${index + 1}</span>
          <span class="flex-1 text-[13px] font-medium">${product.name}</span>
          <span class="text-[12px] text-black/45">${money(product.price)}</span>
          <i data-lucide="arrow-up-right" class="h-3.5 w-3.5 text-black/25"></i>
        </button>`).join('');
      refreshIcons();
    }

    function selectProduct(id) {
      if (!state.products.some(product => product.id === id)) return;
      state.selectedId = id;
      el.models.forEach(model => {
        const selected = Number(model.dataset.id) === id;
        model.classList.toggle('selected', selected);
        model.classList.toggle('muted', !selected);
      });
      const product = state.products.find(item => item.id === id);
      el.selectedName.textContent = product.name;
      el.selectedMeta.textContent = `${product.meta} · ${money(product.price)}`;
      renderVerificationPanel(product);
      el.info.classList.remove('hidden');
      el.info.classList.add('flex');
      renderResults();
    }

    async function search(text) {
      if (!canSend()) return;
      const token = ++state.searchToken;
      state.lastQuery = text;
      setSuggestionsOpen(false);
      addUserMessage(text);
      void persistConversation(text);
      const hadImage = Boolean(state.imageData);
      el.input.value = '';
      state.imageData = null;
      el.preview.src = '';
      el.attachment.classList.add('hidden');
      state.products = [];
      state.selectedId = null;
      el.results.classList.add('hidden');
      setLoading(true);

      const labels = hadImage ? ['czytam zdjęcie', 'rozpoznaję formę', 'porównuję'] : ['szukam', 'porównuję', 'układam'];
      let labelIndex = 0;
      el.searchLabel.textContent = labels[0];
      const labelTimer = setInterval(() => {
        labelIndex = (labelIndex + 1) % labels.length;
        el.searchLabel.textContent = labels[labelIndex];
      }, 520);

      await new Promise(resolve => setTimeout(resolve, 1900));
      clearInterval(labelTimer);
      if (token !== state.searchToken) return;
      state.products = structuredClone(productsSeed).map(product => {
        if (state.priority === 'price') product.price = product.cheaper;
        return product;
      });
      setLoading(false);
      el.models.forEach(model => model.classList.add('visible'));
      addAgentMessage(hadImage ? 'Znalazłem trzy najbliższe odpowiedniki.' : 'Mam trzy dobre opcje.');
      renderResults();
      selectProduct(1);
      el.input.disabled = false;
      syncSend();
      if (window.innerWidth < 768) el.stage.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function reset() {
      state.searchToken += 1;
      state.loading = false;
      state.products = [];
      state.selectedId = null;
      state.lastQuery = '';
      state.verificationExpanded = false;
      state.imageData = null;
      el.messages.innerHTML = '';
      el.results.innerHTML = '';
      el.results.classList.add('hidden');
      el.models.forEach(model => model.classList.remove('visible', 'selected', 'muted'));
      el.info.classList.add('hidden');
      el.info.classList.remove('flex');
      el.verificationPanel.innerHTML = '';
      el.verificationBadges.innerHTML = '';
      setVerificationExpanded(false);
      setSuggestionsOpen(false);
      el.idle.classList.remove('opacity-0');
      el.attachment.classList.add('hidden');
      el.search.classList.add('hidden');
      el.search.classList.remove('flex');
      el.stage.classList.remove('searching');
      el.input.disabled = false;
      setMenu(false);
      el.input.value = '';
      el.input.focus();
      syncSend();
    }

    el.form.addEventListener('submit', event => { event.preventDefault(); search(el.input.value.trim()); });
    el.input.addEventListener('input', () => { syncSend(); renderSuggestions(); });
    el.input.addEventListener('focus', () => { if (!state.loading) renderSuggestions(); });
    el.input.addEventListener('blur', () => {
      setTimeout(() => setSuggestionsOpen(false), 120);
    });
    el.input.addEventListener('keydown', event => {
      const items = filterSuggestions(el.input.value);
      if (state.suggestionsOpen && items.length) {
        if (event.key === 'ArrowDown') {
          event.preventDefault();
          state.suggestionIndex = (state.suggestionIndex + 1) % items.length;
          renderSuggestions();
          return;
        }
        if (event.key === 'ArrowUp') {
          event.preventDefault();
          state.suggestionIndex = state.suggestionIndex <= 0 ? items.length - 1 : state.suggestionIndex - 1;
          renderSuggestions();
          return;
        }
        if (event.key === 'Escape') {
          setSuggestionsOpen(false);
          return;
        }
        if (event.key === 'Enter' && state.suggestionIndex >= 0 && !event.shiftKey) {
          event.preventDefault();
          applySuggestion(items[state.suggestionIndex]);
          return;
        }
      }
      if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); el.form.requestSubmit(); }
    });
    el.suggestionsList.addEventListener('mousedown', event => {
      const button = event.target.closest('[data-suggestion]');
      if (!button) return;
      event.preventDefault();
      applySuggestion(button.dataset.suggestion);
    });
    el.verificationToggle.addEventListener('click', event => {
      event.stopPropagation();
      setVerificationExpanded(!state.verificationExpanded);
    });
    document.addEventListener('paste', event => {
      const image = [...(event.clipboardData?.files || [])].find(file => file.type.startsWith('image/'));
      if (image) { event.preventDefault(); handleImage(image); }
    });
    el.attach.addEventListener('click', () => el.imageInput.click());
    el.imageInput.addEventListener('change', () => handleImage(el.imageInput.files[0]));
    $('#removeImage').addEventListener('click', () => {
      state.imageData = null; el.preview.src = ''; el.attachment.classList.add('hidden'); el.imageInput.value = ''; syncSend();
    });
    el.menuButton.addEventListener('click', event => { event.stopPropagation(); setMenu(el.menu.classList.contains('hidden')); });
    document.addEventListener('click', event => { if (!el.menu.contains(event.target) && event.target !== el.menuButton) setMenu(false); });
    el.autoSwitch.addEventListener('click', () => {
      state.autoReplace = !state.autoReplace;
      el.autoSwitch.setAttribute('aria-checked', String(state.autoReplace));
    });
    el.priority.addEventListener('change', () => { state.priority = el.priority.value; showToast('Priorytet zapisany'); });
    $('#resetButton').addEventListener('click', reset);
    $('#brandButton').addEventListener('click', reset);
    el.results.addEventListener('click', event => {
      const button = event.target.closest('[data-result-id]');
      if (button) selectProduct(Number(button.dataset.resultId));
    });
    el.models.forEach(model => model.addEventListener('click', () => selectProduct(Number(model.dataset.id))));
    $('#selectedInfo').addEventListener('click', event => {
      if (event.target.closest('#verificationToggle') || event.target.closest('#verificationPanel')) return;
      const button = event.target.closest('[data-stage-action]');
      if (!button || !state.selectedId) return;
      const product = state.products.find(item => item.id === state.selectedId);
      if (button.dataset.stageAction === 'cheaper') {
        product.price = product.cheaper; renderResults(); selectProduct(product.id); showToast('Znaleziono tańszą opcję');
      }
      if (button.dataset.stageAction === 'change') {
        product.meta = product.meta.includes('wariant 2') ? product.meta.replace(' · wariant 2', '') : `${product.meta} · wariant 2`;
        selectProduct(product.id); showToast('Wariant zmieniony');
      }
      if (button.dataset.stageAction === 'remove') {
        const removedId = product.id;
        state.products = state.products.filter(item => item.id !== removedId);
        const model = el.models.find(item => Number(item.dataset.id) === removedId);
        model.classList.remove('visible', 'selected', 'muted');
        renderResults();
        if (state.products.length) selectProduct(state.products[0].id);
        else { state.selectedId = null; el.info.classList.add('hidden'); el.info.classList.remove('flex'); el.idle.classList.remove('opacity-0'); }
        showToast('Usunięto');
      }
    });

    el.accountButton.addEventListener('click', () => setAccountOpen(true));
    $('#closeAccount').addEventListener('click', () => setAccountOpen(false));
    el.accountModal.addEventListener('click', event => {
      if (event.target === el.accountModal) setAccountOpen(false);
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && !el.accountModal.classList.contains('hidden')) setAccountOpen(false);
    });
    el.loginForm.addEventListener('submit', async event => {
      event.preventDefault();
      if (!state.authClient) {
        el.loginStatus.textContent = 'Najpierw uzupełnij dane Supabase w pliku config.js.';
        return;
      }
      if (!el.loginEmail.checkValidity()) {
        el.loginStatus.textContent = 'Wpisz poprawny adres e-mail.';
        el.loginEmail.focus();
        return;
      }
      el.loginSubmit.disabled = true;
      el.loginStatus.textContent = 'Wysyłam bezpieczny link…';
      const { error } = await state.authClient.auth.signInWithOtp({
        email: el.loginEmail.value.trim(),
        options: { emailRedirectTo: `${window.location.origin}${window.location.pathname}` }
      });
      el.loginSubmit.disabled = false;
      el.loginStatus.textContent = error
        ? 'Nie udało się wysłać linku. Odczekaj chwilę i spróbuj ponownie.'
        : 'Link jest w skrzynce. Możesz zamknąć to okno.';
    });
    $('#logoutButton').addEventListener('click', async () => {
      await state.authClient?.auth.signOut();
      applyAuthSession(null);
      setAccountOpen(false);
      showToast('Wylogowano');
    });
    $('#refreshHistory').addEventListener('click', loadHistory);
    el.historyList.addEventListener('click', event => {
      const button = event.target.closest('[data-history-id]');
      if (button) openHistorySession(button.dataset.historyId);
    });

    syncSend();
    refreshIcons();
    initializeAuth();
  </script>
</body>
</html>
